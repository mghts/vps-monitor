name: Release Agent Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.1"
        required: true
        default: "v0.2.1"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset: vps-monitor-agent-linux-amd64
          - target: aarch64-unknown-linux-musl
            asset: vps-monitor-agent-linux-arm64
          - target: armv7-unknown-linux-musleabihf
            asset: vps-monitor-agent-linux-armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Build agent
        run: cross build --locked --release -p vps-monitor-agent --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/vps-monitor-agent dist/${{ matrix.asset }}
          chmod +x dist/${{ matrix.asset }}
          sha256sum dist/${{ matrix.asset }} > dist/${{ matrix.asset }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/*

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
