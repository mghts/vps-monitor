name: Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image tag, for example v0.2.1"
        required: true
        default: "v0.2.1"
      push_latest:
        description: "Also push the latest tag"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    name: Build and push multi-arch images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "::error title=缺少 Docker Hub 用户名::请在仓库 Settings -> Secrets and variables -> Actions -> Repository secrets 中添加名为 DOCKERHUB_USERNAME 的 Secret，值为 Docker Hub 用户名（不是 GitHub 用户名）。"
            exit 1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error title=缺少 Docker Hub Token::请在同一位置添加名为 DOCKERHUB_TOKEN 的 Secret，值为 Docker Hub Personal Access Token，且至少具有 Read & Write 权限。"
            exit 1
          fi

      - name: Prepare image tags
        id: meta
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME}"
            PUSH_LATEST="true"
          else
            VERSION="${INPUT_VERSION}"
            PUSH_LATEST="${INPUT_PUSH_LATEST}"
          fi

          {
            echo "version=${VERSION}"
            echo "server_tags<<EOF"
            echo "docker.io/${DOCKERHUB_USERNAME}/vps-monitor-server:${VERSION}"
            if [ "${PUSH_LATEST}" = "true" ]; then
              echo "docker.io/${DOCKERHUB_USERNAME}/vps-monitor-server:latest"
            fi
            echo "EOF"
            echo "agent_tags<<EOF"
            echo "docker.io/${DOCKERHUB_USERNAME}/vps-monitor-agent:${VERSION}"
            if [ "${PUSH_LATEST}" = "true" ]; then
              echo "docker.io/${DOCKERHUB_USERNAME}/vps-monitor-agent:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/server.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.server_tags }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/agent.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.agent_tags }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent

      - name: Summary
        run: |
          echo "Published:"
          echo "${{ steps.meta.outputs.server_tags }}"
          echo "${{ steps.meta.outputs.agent_tags }}"
